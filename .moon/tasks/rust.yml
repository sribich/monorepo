fileGroups:
  rust_sources:
    - src/**/*.rs
    - Cargo.toml
  rust_tests:
    - benches/**/*
    - tests/**/*
tasks:
  clippy:
    command: cargo clippy
    inputs:
      - "@globs(rust_sources)"
      - "@globs(rust_tests)"

  test:
    command: noop
    deps:
      - test_unit
      - test_docs
    options:
      cache: false

  test_unit:
    command: cargo nextest run
    inputs:
      - "@globs(rust_sources)"
      - "@globs(rust_tests)"
    options:
      cache: false

  test_docs:
    command: cargo test --doc
    inputs:
      - "@globs(rust_sources)"
      - "@globs(rust_tests)"
    options:
      cache: false

  update_snapshots:
    command: cargo test
    inputs:
      - "@globs(rust_sources)"
      - "@globs(rust_tests)"
    env:
      UPDATE_EXPECT: "1"

  cargo:
    command: cargo
    options:
      cache: false

  geiger:
    command: cargo geiger

  hack:
    command: cargo hack check --feature-powerset --no-dev-deps --depth 3

  expand:
    command: cargo expand

  format:
    command: cargo fmt

  bacon:
    command: bacon .
    options:
      cache: false
      persistent: true
